<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Señora Taco - POS Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #FFFDF5; -webkit-tap-highlight-color: transparent; }
        @media print {
            body * { visibility: hidden; }
            #ticket-imprimible, #ticket-imprimible * { visibility: visible; }
            #ticket-imprimible { position: absolute; left: 0; top: 0; width: 80mm; border: none; padding: 5mm; display: block !important; }
            @page { size: 80mm auto; margin: 0; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-active:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN Y CONSTANTES ---
        const DIRECCION = "Paseo de la luz 4403, Col. Villa las Fuentes, Monterrey, N.L.";
        const GUISOS = ["Barbacoa", "Chicharrón en S. Verde", "Deshebrada con Papa", "Machacado", "Rajas con Queso", "Papita en S. Roja", "Queso en S. Roja", "Picadillo", "Huevito en S. Verde", "Papa con Chorizo", "Frijolitos", "Nopales", "Quesadilla", "Chile Relleno de Queso", "Chile Relleno de Picadillo"];
        const PRECIOS = { "Barbacoa": 30, "Machacado": 25, "Frijolitos": 20, "Nopales": 20, "Quesadilla": 20, "Chile Relleno de Queso": 30, "Chile Relleno de Picadillo": 30, "default": 25 };
        const BEBIDAS_LISTA = [
            { id: 's1', nombre: "Sprite", precio: 25 },
            { id: 's2', nombre: "Ponche", precio: 25 },
            { id: 's3', nombre: "Coca Cola Zero 250ml", precio: 15 },
            { id: 's4', nombre: "Coca Cola 250ml", precio: 15 },
            { id: 's5', nombre: "Joya Manzana", precio: 25 },
            { id: 's6', nombre: "Coca Cola Zero", precio: 25 },
            { id: 's7', nombre: "Coca Cola Regular", precio: 25 },
            { id: 's8', nombre: "Agua", precio: 15 },
            { id: 's9', nombre: "Café", precio: 35 }
        ];
        const COMBOS_DATA = [
            { id: 'c1', nombre: 'Individual', precio: 135, nPlatos: 1, nTacos: 5, nBebidas: 1 },
            { id: 'c2', nombre: 'Pareja', precio: 275, nPlatos: 2, nTacos: 5, nBebidas: 2 },
            { id: 'c3', nombre: 'Familiar', precio: 465, nPlatos: 4, nTacos: 4, nBebidas: 4 },
        ];
        const DENOMINACIONES = [1000, 500, 200, 100, 50, 20, 10, 5, 2, 1, 0.5];

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'senora-taco-pos';
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- COMPONENTES ---
        function TacoConfigRow({ taco, onChange, index }) {
            return (
                <div className="bg-white p-4 rounded-3xl border border-stone-100 shadow-sm mb-3">
                    <div className="flex justify-between items-center mb-2 px-1 text-stone-400 font-bold text-[10px]">TACO {index + 1}</div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <select className="w-full bg-stone-50 border-none rounded-xl p-3 text-sm font-bold outline-none ring-1 ring-stone-200" value={taco.guiso} onChange={(e) => onChange('guiso', e.target.value)}>
                            {GUISOS.map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                        <div className="flex bg-stone-100 p-1 rounded-xl">
                            <button onClick={() => onChange('tortilla', 'Harina')} className={`flex-1 py-2 text-[10px] font-bold rounded-lg transition ${taco.tortilla === 'Harina' ? 'bg-white shadow text-stone-800' : 'text-stone-400'}`}>Harina</button>
                            <button onClick={() => onChange('tortilla', 'Maíz')} className={`flex-1 py-2 text-[10px] font-bold rounded-lg transition ${taco.tortilla === 'Maíz' ? 'bg-white shadow text-stone-800' : 'text-stone-400'}`}>Maíz</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('pos');
            const [sesion, setSesion] = useState(null);
            const [tickets, setTickets] = useState([]);
            const [carrito, setCarrito] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            
            // UI States
            const [wizardCombo, setWizardCombo] = useState(null);
            const [activeLibre, setActiveLibre] = useState(null);
            const [activeCart, setActiveCart] = useState(false);
            const [activeSurtir, setActiveSurtir] = useState(false);
            const [activeCambio, setActiveCambio] = useState(null);
            const [activeExito, setActiveExito] = useState(false);
            const [printData, setPrintData] = useState(null);
            const [apertura, setApertura] = useState({ cash: {}, stock: {} });

            useEffect(() => {
                const initAuth = async () => {
                    if (window.__initial_auth_token) {
                        await auth.signInWithCustomToken(window.__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const sessionsPath = `artifacts/${appId}/users/${user.uid}/sesiones`;
                const ticketsPath = `artifacts/${appId}/users/${user.uid}/tickets`;

                const unsubSesion = db.collection(sessionsPath).where('estado', '==', 'Abierta').onSnapshot(s => {
                    setSesion(s.docs.length > 0 ? { id: s.docs[0].id, ...s.docs[0].data() } : null);
                });

                const unsubTickets = db.collection(ticketsPath).onSnapshot(s => {
                    setTickets(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.fecha - a.fecha));
                });

                return () => { unsubSesion(); unsubTickets(); };
            }, [user]);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            const subtotal = useMemo(() => carrito.reduce((s, i) => s + (i.tipo === 'combo' ? i.combo.precio : i.precioTotal), 0), [carrito]);
            const total = subtotal; // Aquí podrías aplicar promos si fuera necesario

            const handleApertura = async () => {
                if (!user) return;
                setIsLoading(true);
                let totalI = 0;
                Object.entries(apertura.cash).forEach(([d, q]) => totalI += (parseFloat(d) * q));
                try {
                    await db.collection(`artifacts/${appId}/users/${user.uid}/sesiones`).add({
                        fechaApertura: Date.now(),
                        totalInicio: totalI,
                        inventario: apertura.stock,
                        estado: 'Abierta'
                    });
                } catch(e) { console.error(e); }
                finally { setIsLoading(false); }
            };

            const cobroFinal = async (metodo, recibido = 0) => {
                if (!user || !sesion) return;
                setIsLoading(true);
                const tkt = {
                    fecha: Date.now(),
                    sesionId: sesion.id,
                    items: carrito,
                    subtotal,
                    total,
                    metodo,
                    pagadoCon: metodo === 'Efectivo' ? recibido : total,
                    cambio: metodo === 'Efectivo' ? (recibido - total) : 0,
                    propina: 0
                };
                try {
                    const docRef = await db.collection(`artifacts/${appId}/users/${user.uid}/tickets`).add(tkt);
                    const nInv = { ...sesion.inventario };
                    carrito.forEach(i => {
                        if (i.tipo === 'combo') i.beverages.forEach(bId => nInv[bId] = Math.max(0, (nInv[bId] || 0) - 1));
                    });
                    await db.collection(`artifacts/${appId}/users/${user.uid}/sesiones`).doc(sesion.id).update({ inventario: nInv });
                    
                    setPrintData({ ...tkt, id: docRef.id });
                    setActiveExito(true);
                    setCarrito([]);
                    setActiveCart(false);
                    setActiveCambio(null);
                } catch(e) { console.error(e); }
                finally { setIsLoading(false); }
            };

            // --- VISTAS CONDICIONALES ---
            if (!user) return <div className="flex h-screen items-center justify-center font-bold text-stone-400 uppercase tracking-widest">Iniciando...</div>;

            if (!sesion) return (
                <div className="min-h-screen p-4 flex items-center justify-center bg-[#5C3A21]">
                    <div className="bg-white rounded-[2rem] w-full max-w-4xl flex flex-col md:flex-row shadow-2xl overflow-hidden">
                        <div className="bg-[#E6A122] p-8 text-white md:w-2/5 flex flex-col justify-center text-center">
                            <i data-lucide="calculator" className="w-12 h-12 mx-auto mb-4 text-[#5C3A21]"></i>
                            <h2 className="text-3xl font-black uppercase mb-6 leading-none">Abrir Turno</h2>
                            <p className="text-[10px] font-bold opacity-70 uppercase mb-2">Fondo Inicial</p>
                            <div className="text-5xl font-black">$
                                {Object.entries(apertura.cash).reduce((acc, [d, q]) => acc + (parseFloat(d) * q), 0)}
                            </div>
                        </div>
                        <div className="p-6 md:p-8 flex-1 max-h-[80vh] overflow-y-auto no-scrollbar space-y-8 font-bold">
                            <div className="grid grid-cols-2 gap-3">
                                {DENOMINACIONES.map(d => (
                                    <div key={d} className="bg-stone-50 p-2 rounded-xl flex items-center justify-between px-4 border border-stone-100">
                                        <span className="text-stone-300 text-xs">${d}</span>
                                        <input type="number" placeholder="0" className="w-12 bg-transparent text-center font-bold text-lg text-[#5C3A21] outline-none" onChange={e => setApertura({...apertura, cash: {...apertura.cash, [d]: parseInt(e.target.value) || 0}})} />
                                    </div>
                                ))}
                            </div>
                            <div className="border-t pt-6">
                                <h3 className="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-4">Stock Bebidas</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {BEBIDAS_LISTA.map(r => (
                                        <div key={r.id} className="bg-pink-50 p-2 rounded-xl flex items-center justify-between px-4">
                                            <span className="text-[9px] font-bold uppercase truncate opacity-60 pr-2">{r.nombre}</span>
                                            <input type="number" placeholder="0" className="w-10 bg-white rounded text-center font-bold text-pink-600 outline-none p-1 shadow-inner" onChange={e => setApertura({...apertura, stock: {...apertura.stock, [r.id]: parseInt(e.target.value) || 0}})} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button onClick={handleApertura} disabled={isLoading} className="w-full bg-[#5C3A21] text-white font-black py-5 rounded-3xl shadow-xl btn-active uppercase text-sm">Iniciar Turno</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col font-bold">
                    {/* TICKET IMPRIMIBLE (OCULTO) */}
                    <div id="ticket-imprimible" className="hidden font-mono text-[10px] leading-tight text-center">
                        {printData && (
                            <div className="p-4 border border-dashed border-stone-300">
                                <h2 className="text-lg font-black uppercase text-[#5C3A21]">Señora Taco</h2>
                                <p className="text-[7px] opacity-70 mb-2">{DIRECCION}</p>
                                <p className="text-[8px] mb-4">{new Date(printData.fecha).toLocaleString()}</p>
                                <div className="border-b border-dashed my-2"></div>
                                {printData.items.map((i, idx) => (
                                    <div key={idx} className="flex justify-between text-left mb-1">
                                        <span className="uppercase">{i.tipo==='combo'?`Combo ${i.combo.nombre}`: (i.nombrePersona || "Orden")}</span>
                                        <span>${i.tipo==='combo'?i.combo.precio:i.precioTotal}</span>
                                    </div>
                                ))}
                                <div className="border-t border-dashed my-2"></div>
                                <div className="flex justify-between font-black text-[12px]"><span>TOTAL</span><span>${printData.total}.00</span></div>
                                <div className="flex justify-between mt-1 text-[8px] opacity-50"><span>PAGADO:</span><span>${printData.pagadoCon}</span></div>
                                <div className="flex justify-between text-[8px] opacity-50"><span>CAMBIO:</span><span>${printData.cambio}</span></div>
                                <p className="mt-6 uppercase font-black opacity-30 text-[7px] italic">¡Gracias por su compra!</p>
                            </div>
                        )}
                    </div>

                    {/* NAVBAR */}
                    <nav className="bg-[#E6A122] p-4 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-1 rounded-full w-10 h-10 flex items-center justify-center font-black text-[#E6A122] shadow-md">🌮</div>
                            <h1 className="font-black uppercase tracking-tighter text-xl">Sra. Taco</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setView('pos')} className={`p-3 rounded-2xl transition ${view==='pos'?'bg-[#5C3A21] shadow-lg':''}`}><i data-lucide="layout-grid"></i></button>
                            <button onClick={()=>setView('history')} className={`p-3 rounded-2xl transition ${view==='history'?'bg-[#5C3A21] shadow-lg':''}`}><i data-lucide="history"></i></button>
                            <button onClick={()=>setActiveCart(true)} className="ml-2 bg-[#E84E8A] px-5 py-3 rounded-full font-black shadow-lg btn-active flex items-center gap-2 relative">
                                <i data-lucide="shopping-cart" className="w-5 h-5"></i>
                                {carrito.length>0 && <span className="absolute -top-1 -right-1 bg-white text-[#E84E8A] w-5 h-5 flex items-center justify-center rounded-full text-[10px] font-black">{carrito.length}</span>}
                            </button>
                        </div>
                    </nav>

                    <main className="p-4 sm:p-8 max-w-7xl mx-auto flex-1 w-full no-print">
                        {view === 'pos' ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {COMBOS_DATA.map(c => (
                                    <div key={c.id} className="bg-white rounded-[2.5rem] p-8 border border-stone-100 shadow-sm text-center flex flex-col group hover:shadow-xl transition-all">
                                        <h3 className="text-xl font-black uppercase text-stone-700">{c.nombre}</h3>
                                        <div className="my-6 text-5xl font-black text-[#E84E8A] tracking-tighter">${c.precio}</div>
                                        <button onClick={() => {
                                            const ords = Array.from({length: c.nPlatos}, () => ({nombre: "", tacos: Array.from({length: c.nTacos}, () => ({guiso: "Deshebrada con Papa", tortilla: "Maíz"}))}));
                                            setWizardCombo({ combo: c, paso: 0, ords, beverages: Array.from({length: c.nBebidas}, () => BEBIDAS_LISTA[0].id) });
                                        }} className="mt-auto w-full bg-[#5C3A21] text-white font-bold py-4 rounded-3xl shadow-lg btn-active uppercase text-[10px] tracking-widest">Armar Combo</button>
                                    </div>
                                ))}
                                <div className="sm:col-span-2 lg:col-span-3">
                                    <button onClick={() => setActiveLibre({nombrePersona: "", tacos: [{guiso: "Barbacoa", tortilla: "Maíz"}], bebidasExtras: []})} className="w-full border-4 border-dashed border-stone-200 rounded-[2.5rem] p-12 text-stone-300 font-black uppercase text-xl hover:bg-white hover:text-pink-500 hover:border-pink-500 transition-all btn-active">
                                        <i data-lucide="plus-circle" className="inline w-8 h-8 mr-2 -mt-1"></i> Orden Individual
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-white rounded-3xl p-6 shadow-xl flex flex-col lg:flex-row justify-between items-center gap-6 border border-stone-50">
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 flex-1 w-full text-center">
                                        <div className="bg-stone-50 p-4 rounded-2xl shadow-inner"><p className="text-[8px] opacity-30 uppercase">Fondo</p><p className="text-xl font-black">${sesion?.totalInicio}</p></div>
                                        <div className="bg-green-50 p-4 rounded-2xl shadow-inner"><p className="text-[8px] text-green-400 uppercase">Efectivo</p><p className="text-xl font-black text-green-700">${tickets.filter(t=>t.metodo==='Efectivo').reduce((s,t)=>s+t.total,0)}</p></div>
                                        <div className="bg-blue-50 p-4 rounded-2xl shadow-inner"><p className="text-[8px] text-blue-400 uppercase">Tarjeta/Otros</p><p className="text-xl font-black text-blue-700">${tickets.filter(t=>t.metodo!=='Efectivo').reduce((s,t)=>s+t.total,0)}</p></div>
                                        <div className="bg-amber-50 p-4 rounded-2xl shadow-inner"><p className="text-[8px] text-amber-500 uppercase">Propina</p><p className="text-xl font-black text-amber-700">${tickets.reduce((s,t)=>s+(t.propina||0),0)}</p></div>
                                    </div>
                                    <button onClick={()=>setActiveSurtir(true)} className="bg-stone-800 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">📦 SURTIR STOCK</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {tickets.map(t => (
                                        <div key={t.id} className="bg-white rounded-3xl p-5 border border-stone-100 shadow-sm flex flex-col justify-between hover:shadow-lg transition-all">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-[9px] opacity-40 uppercase">{new Date(t.fecha).toLocaleTimeString()}</span>
                                                <span className="text-[8px] font-black px-3 py-1 rounded-full uppercase bg-stone-100">{t.metodo}</span>
                                            </div>
                                            <p className="text-3xl font-black text-[#5C3A21]">${t.total}.00</p>
                                            <div className="mt-4 flex gap-2">
                                                <button onClick={() => { setPrintData(t); setTimeout(()=>window.print(), 300); }} className="flex-1 py-3 bg-stone-50 rounded-xl text-[9px] font-black uppercase flex items-center justify-center gap-1 text-stone-400 border border-stone-100"><i data-lucide="printer" className="w-4 h-4"></i> Ticket</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- MODALES --- */}

                    {/* WIZARD COMBO */}
                    {wizardCombo && (
                        <div className="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
                                <div className="p-8 bg-amber-500 text-white flex justify-between items-center">
                                    <div><h3 className="text-xl font-black uppercase leading-none">{wizardCombo.combo.nombre}</h3><p className="text-[9px] opacity-70 mt-2 uppercase">Plato {wizardCombo.paso+1} de {wizardCombo.combo.nPlatos}</p></div>
                                    <button onClick={()=>setWizardCombo(null)} className="p-2 bg-white/10 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                <div className="p-6 flex-1 overflow-y-auto no-scrollbar space-y-4">
                                    {wizardCombo.paso < wizardCombo.combo.nPlatos ? (
                                        <div className="space-y-4">
                                            <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100">
                                                <label className="text-[10px] uppercase text-amber-600 block mb-2">Nombre en el plato</label>
                                                <input type="text" placeholder="Ej. Juan, María..." className="w-full bg-white p-4 rounded-xl text-xl font-black uppercase outline-none focus:ring-2 ring-amber-300 transition-all" value={wizardCombo.ords[wizardCombo.paso].nombre} onChange={e => {
                                                    const n = [...wizardCombo.ords]; n[wizardCombo.paso].nombre = e.target.value; setWizardCombo({...wizardCombo, ords: n});
                                                }} />
                                            </div>
                                            {wizardCombo.ords[wizardCombo.paso].tacos.map((t, idx) => (
                                                <TacoConfigRow key={idx} index={idx} taco={t} onChange={(c,v)=>{
                                                    const n = [...wizardCombo.ords]; n[wizardCombo.paso].tacos[idx][c] = v; setWizardCombo({...wizardCombo, ords: n});
                                                }} />
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <h4 className="text-center font-black uppercase tracking-widest text-stone-300">Seleccionar Refrescos</h4>
                                            {wizardCombo.beverages.map((bid, i) => (
                                                <select key={i} className="w-full p-6 bg-stone-50 border border-stone-200 rounded-2xl font-bold text-lg outline-none" value={bid} onChange={e => {
                                                    const n = [...wizardCombo.beverages]; n[i] = e.target.value; setWizardCombo({...wizardCombo, beverages: n});
                                                }}>
                                                    {BEBIDAS_LISTA.map(r => (
                                                        <option key={r.id} value={r.id} disabled={(sesion.inventario?.[r.id]||0) <= 0}>
                                                            {r.nombre} (Stock: {sesion.inventario?.[r.id] || 0})
                                                        </option>
                                                    ))}
                                                </select>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 border-t bg-white flex justify-between">
                                    {wizardCombo.paso > 0 ? <button onClick={()=>setWizardCombo({...wizardCombo, paso: wizardCombo.paso-1})} className="text-[11px] font-bold text-stone-400 uppercase px-6">Atrás</button> : <div/>}
                                    {wizardCombo.paso < wizardCombo.combo.nPlatos ? (
                                        <button onClick={()=>setWizardCombo({...wizardCombo, paso: wizardCombo.paso+1})} className="bg-amber-500 text-white font-black px-10 py-4 rounded-2xl shadow-lg btn-active text-xs uppercase ml-auto">Siguiente</button>
                                    ) : (
                                        <button onClick={()=>{ setCarrito([...carrito, {tipo:'combo', ...wizardCombo, idCart: Date.now()+Math.random()}]); setWizardCombo(null); }} className="bg-pink-500 text-white font-black px-10 py-4 rounded-2xl shadow-lg btn-active text-xs uppercase">Cargar Orden</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CAJA / CARRITO */}
                    {activeCart && (
                        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex justify-end no-print">
                            <div className="bg-[#FFFDF5] w-full max-w-sm h-full flex flex-col shadow-2xl animate-in slide-in-from-right duration-300">
                                <div className="p-8 bg-[#5C3A21] text-white flex justify-between items-center">
                                    <h3 className="font-black uppercase tracking-widest flex items-center text-lg"><i data-lucide="shopping-bag" className="w-6 h-6 mr-3"></i> Mi Caja</h3>
                                    <button onClick={()=>setActiveCart(false)} className="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="x"></i></button>
                                </div>
                                <div className="p-6 flex-1 overflow-y-auto no-scrollbar space-y-4">
                                    {carrito.length === 0 ? <p className="text-stone-300 text-center mt-20 uppercase text-xs tracking-[0.3em]">Caja Vacía</p> : 
                                        carrito.map(i => (
                                            <div key={i.idCart} className="bg-white p-5 rounded-2xl border border-stone-200 flex justify-between items-center shadow-sm relative group">
                                                <button onClick={()=>setCarrito(carrito.filter(x=>x.idCart!==i.idCart))} className="absolute -top-1 -right-1 bg-red-500 text-white p-2 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="x" className="w-3 h-3"></i></button>
                                                <div className="flex-1 text-left">
                                                    <span className="font-black text-[#5C3A21] uppercase text-xs block leading-tight">{i.tipo==='combo'?`Combo ${i.combo.nombre}`: (i.nombrePersona || "Libre")}</span>
                                                </div>
                                                <span className="font-black text-2xl text-amber-600">${i.tipo==='combo'?i.combo.precio:i.precioTotal}</span>
                                            </div>
                                        ))
                                    }
                                </div>
                                <div className="p-8 bg-white border-t space-y-6">
                                    <div className="flex justify-between items-end text-[#5C3A21]">
                                        <div className="flex flex-col"><span className="text-stone-300 uppercase text-[10px] tracking-widest leading-none">Total</span><span className="text-6xl font-black leading-none">${total}.00</span></div>
                                    </div>
                                    <div className="grid grid-cols-1 gap-3">
                                        <button disabled={isLoading||carrito.length===0} onClick={()=>setActiveCambio({pagadoCon: total, cambio:0})} className="bg-green-600 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 disabled:opacity-20 transition-all"><i data-lucide="banknote"></i> EFECTIVO</button>
                                        <button disabled={isLoading||carrito.length===0} onClick={()=>cobroFinal('Tarjeta')} className="bg-blue-600 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 disabled:opacity-20 transition-all"><i data-lucide="credit-card"></i> TARJETA</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CAMBIO EFECTIVO */}
                    {activeCambio && (
                        <div className="fixed inset-0 z-[80] bg-[#5C3A21]/90 flex items-center justify-center p-4 backdrop-blur-md no-print">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm p-10 shadow-2xl animate-in zoom-in-95 text-center">
                                <h3 className="text-2xl font-black uppercase text-[#5C3A21] mb-8">Cobro Efectivo</h3>
                                <div className="bg-stone-50 p-8 rounded-3xl mb-8 space-y-6 border border-stone-100">
                                    <span className="text-[10px] text-stone-300 uppercase tracking-widest block">Total: ${total}.00</span>
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-green-500 uppercase tracking-widest font-black">Recibido ($)</label>
                                        <input type="number" className="w-full bg-white border-2 border-stone-100 rounded-2xl p-6 text-6xl font-black text-green-600 text-center outline-none focus:ring-4 ring-green-100" value={activeCambio.pagadoCon} onChange={e=>{ 
                                            const v = parseFloat(e.target.value)||0; setActiveCambio({...activeCambio, pagadoCon:v, cambio: Math.max(0, v - total)}) 
                                        }} autoFocus />
                                    </div>
                                    <div className="flex justify-between items-center pt-6 border-t-2 border-stone-100">
                                        <span className="text-[10px] text-stone-300 uppercase">Cambio</span>
                                        <span className="text-4xl font-black text-amber-500">${activeCambio.cambio}.00</span>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setActiveCambio(null)} className="flex-1 py-4 font-bold text-stone-300 uppercase text-xs">Atrás</button>
                                    <button onClick={()=>cobroFinal('Efectivo', activeCambio.pagadoCon)} disabled={activeCambio.pagadoCon < total||isLoading} className="flex-[2] bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl btn-active uppercase text-xs">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXITO */}
                    {activeExito && (
                        <div className="fixed inset-0 z-[90] bg-[#5C3A21] flex items-center justify-center p-8 text-center no-print">
                            <div className="max-w-sm w-full animate-in zoom-in-90 duration-500">
                                <div className="w-32 h-32 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-10 shadow-xl border-8 border-green-400">
                                    <i data-lucide="check" className="w-16 h-16 text-white"></i>
                                </div>
                                <h2 className="text-6xl font-black text-white uppercase tracking-tighter mb-4">¡Vendido!</h2>
                                <p className="text-yellow-400 font-bold uppercase text-[10px] tracking-[0.4em] mb-12">Registro guardado correctamente</p>
                                <div className="space-y-4">
                                    <button onClick={()=>{setTimeout(()=>window.print(), 300);}} className="w-full bg-white text-[#5C3A21] font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 uppercase text-xs btn-active"><i data-lucide="printer"></i> Imprimir Ticket</button>
                                    <button onClick={()=>setActiveExito(false)} className="w-full bg-white/10 text-white font-bold py-5 rounded-2xl uppercase text-[10px] btn-active">Nueva Venta</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SURTIR STOCK */}
                    {activeSurtir && (
                        <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-lg p-8 shadow-2xl overflow-hidden">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase text-[#5C3A21]">Surtir Bebidas</h3>
                                    <button onClick={()=>setActiveSurtir(false)} className="p-2 bg-stone-100 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-3 mb-8 max-h-[50vh] overflow-y-auto no-scrollbar pr-2">
                                    {BEBIDAS_LISTA.map(r => (
                                        <div key={r.id} className="bg-stone-50 p-4 rounded-2xl flex items-center justify-between border border-stone-100">
                                            <div className="flex-1"><p className="text-[8px] text-stone-400 uppercase truncate mb-1">{r.nombre}</p><p className="text-xl font-black text-[#5C3A21]">Stock: {sesion.inventario?.[r.id]||0}</p></div>
                                            <button onClick={async ()=>{
                                                const nInv = {...sesion.inventario}; nInv[r.id] = (nInv[r.id]||0) + 1;
                                                await db.collection(`artifacts/${appId}/users/${user.uid}/sesiones`).doc(sesion.id).update({inventario: nInv});
                                            }} className="bg-pink-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg active:scale-90"><i data-lucide="plus"></i></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setActiveSurtir(false)} className="w-full bg-[#5C3A21] text-white py-5 rounded-2xl font-black uppercase text-xs">Finalizar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
