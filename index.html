<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Señora Taco - POS Profesional</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #FFFDF5; -webkit-tap-highlight-color: transparent; }
        
        @media print {
            body * { visibility: hidden; }
            #ticket-real, #ticket-real * { visibility: visible; }
            #ticket-real { position: absolute; left: 0; top: 0; width: 80mm; border: none; padding: 5mm; }
            @page { size: 80mm auto; margin: 0; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-active:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN ---
        const DIRECCION = "Paseo de la luz 4403, Col. Villa las Fuentes, Monterrey, N.L.";
        const URL_LOGO = "17508.png"; 
        
        const GUISOS = ["Barbacoa", "Chicharrón en S. Verde", "Deshebrada con Papa", "Machacado", "Rajas con Queso", "Papita en S. Roja", "Queso en S. Roja", "Picadillo", "Huevito en S. Verde", "Papa con Chorizo", "Frijolitos", "Nopales", "Quesadilla", "Chile Relleno de Queso", "Chile Relleno de Picadillo"];
        const PRECIOS = { "Barbacoa": 30, "Machacado": 25, "Frijolitos": 20, "Nopales": 20, "Quesadilla": 20, "Chile Relleno de Queso": 30, "Chile Relleno de Picadillo": 30, "default": 25 };
        
        const BEBIDAS_CAT = [
            { id: 's1', nombre: "Sprite", precio: 25 },
            { id: 's2', nombre: "Ponche", precio: 25 },
            { id: 's3', nombre: "Coca Cola Zero 250ml", precio: 15 },
            { id: 's4', nombre: "Coca Cola 250ml", precio: 15 },
            { id: 's5', nombre: "Joya Manzana", precio: 25 },
            { id: 's6', nombre: "Coca Cola Zero", precio: 25 },
            { id: 's7', nombre: "Coca Cola Regular", precio: 25 },
            { id: 's8', nombre: "Agua", precio: 15 },
            { id: 's9', nombre: "Café", precio: 35 }
        ];

        const COMBOS_DATA = [
            { id: 'c1', nombre: 'Individual', precio: 135, ords: 1, tacos: 5, beb: 1 },
            { id: 'c2', nombre: 'Pareja', precio: 275, ords: 2, tacos: 5, beb: 2 },
            { id: 'c3', nombre: 'Familiar', precio: 465, ords: 4, tacos: 4, beb: 4 },
        ];

        // --- FIREBASE ---
        const config = JSON.parse(window.__firebase_config || '{}');
        if (config.apiKey) firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = window.__app_id || 'sra-taco-pos-final';

        // Componente TacoConfigRow
        function TacoConfigRow({ taco, onChange, index }) {
            const reglaQueso = taco.guiso === "Frijolitos" || taco.guiso === "Nopales";
            return (
                <div className="bg-white p-6 rounded-[2.5rem] border border-stone-100 shadow-md mb-4 animate-in slide-in-from-right duration-500">
                    <div className="flex justify-between items-center mb-4 px-2">
                        <span className="bg-amber-100 text-amber-800 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Taco {index + 1}</span>
                        <span className="text-[11px] font-black text-pink-500 leading-none">${PRECIOS[taco.guiso] || 25}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                        <div className="space-y-1">
                             <label className="text-[9px] font-black uppercase text-stone-300 ml-2 font-black">Guiso</label>
                             <select className="w-full bg-stone-50 border-none rounded-2xl p-4 text-sm font-black outline-none ring-2 ring-stone-100 focus:ring-4 focus:ring-amber-400 appearance-none shadow-inner" value={taco.guiso} onChange={(e) => onChange('guiso', e.target.value)}>
                                {GUISOS.map(g => <option key={g} value={g}>{g}</option>)}
                             </select>
                        </div>
                        <div className="space-y-1">
                            <label className="text-[9px] font-black uppercase text-stone-300 ml-2 font-black">Tortilla</label>
                            <div className="flex bg-stone-100 p-1.5 rounded-[1.5rem] shadow-inner font-black">
                                <button onClick={() => onChange('tortilla', 'Harina')} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition ${taco.tortilla === 'Harina' ? 'bg-white shadow-xl text-[#5C3A21]' : 'text-stone-400'}`}>HARINA</button>
                                <button onClick={() => onChange('tortilla', 'Maíz')} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition ${taco.tortilla === 'Maíz' ? 'bg-white shadow-xl text-[#5C3A21]' : 'text-stone-400'}`}>MAÍZ</button>
                            </div>
                        </div>
                    </div>
                    <label className="mt-8 flex items-center cursor-pointer px-6 group font-black">
                        <div className="relative">
                            <input type="checkbox" className="sr-only" checked={taco.frij} onChange={(e) => onChange('frij', e.target.checked)} />
                            <div className={`block w-16 h-9 rounded-full transition-colors ${taco.frij ? 'bg-[#E84E8A]' : 'bg-stone-200'}`}></div>
                            <div className={`absolute left-1.5 top-1.5 bg-white w-6 h-6 rounded-full transition-transform transform ${taco.frij ? 'translate-x-7' : ''} shadow-lg`}></div>
                        </div>
                        <span className="ml-5 text-[13px] font-black text-stone-600 uppercase tracking-tighter opacity-70 font-black">{reglaQueso ? "¿Añadir Queso?" : "¿Untar Frijolitos?"}</span>
                    </label>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('pos');
            const [sesion, setSesion] = useState(null);
            const [tickets, setTickets] = useState([]);
            const [carrito, setCarrito] = useState([]);
            
            const [wizardCombo, setWizardCombo] = useState(null);
            const [modalLibre, setModalLibre] = useState(null);
            const [modalCarrito, setModalCarrito] = useState(false);
            const [modalSurtir, setModalSurtir] = useState(false);
            const [modalCambio, setModalCambio] = useState(null);
            const [modalExito, setModalExito] = useState(false);
            const [printData, setPrintData] = useState(null);

            const [descActivo, setDescActivo] = useState(false);
            const [pctDesc, setPctDesc] = useState(0);
            const [notasVenta, setNotasVenta] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [apertura, setApertura] = useState({ cash: {}, stock: {} });

            useEffect(() => {
                auth.signInAnonymously();
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const path = `artifacts/${appId}/users/${u.uid}`;
                        db.collection(`${path}/sesiones`).where('estado', '==', 'Abierta').onSnapshot(s => {
                            setSesion(s.docs.length > 0 ? { id: s.docs[0].id, ...s.docs[0].data() } : null);
                        });
                        db.collection(`${path}/tickets`).onSnapshot(s => {
                            setTickets(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.fecha - a.fecha));
                        });
                    }
                });
            }, []);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [view, sesion, wizardCombo, modalLibre, modalExito, modalCarrito, modalSurtir, modalCambio]);

            const subtotal = carrito.reduce((s, i) => s + (i.tipo === 'combo' ? i.combo.precio : i.precioTotal), 0);
            const descuentoMonto = descActivo ? (subtotal * (pctDesc / 100)) : 0;
            const totalFinal = subtotal - descuentoMonto;

            const handleApertura = async () => {
                setIsLoading(true);
                let initial = 0;
                Object.entries(apertura.cash).forEach(([d, q]) => initial += (parseFloat(d) * q));
                try {
                    await db.collection(`artifacts/${appId}/users/${user.uid}/sesiones`).add({
                        fechaApertura: Date.now(),
                        totalInicio: initial,
                        inventario: apertura.stock,
                        estado: 'Abierta'
                    });
                } catch(e) { console.error(e); }
                finally { setIsLoading(false); }
            };

            const registrarCobro = async (metodo, recibido = 0) => {
                setIsLoading(true);
                const tkt = {
                    fecha: Date.now(), sesionId: sesion.id, items: carrito,
                    subtotal, descuento: descuentoMonto, total: totalFinal,
                    metodo, pagadoCon: metodo === 'Efectivo' ? recibido : totalFinal,
                    cambio: metodo === 'Efectivo' ? (recibido - totalFinal) : 0,
                    notas: notasVenta, propina: 0
                };
                try {
                    const docRef = await db.collection(`artifacts/${appId}/users/${user.uid}/tickets`).add(tkt);
                    const nInv = { ...sesion.inventario };
                    carrito.forEach(i => {
                        if (i.tipo === 'combo') i.beverages.forEach(b => nInv[b] = Math.max(0, (nInv[b] || 0) - 1));
                        else i.bebidasExtras?.forEach(b => nInv[b.id] = Math.max(0, (nInv[b.id] || 0) - 1));
                    });
                    await db.collection(`artifacts/${appId}/users/${user.uid}/sesiones`).doc(sesion.id).update({ inventario: nInv });
                    setPrintData({ ...tkt, id: docRef.id });
                    setModalExito(true);
                    setCarrito([]);
                    setModalCarrito(false);
                    setModalCambio(null);
                } catch(e) { console.error(e); }
                finally { setIsLoading(false); }
            };

            if (user && !sesion) return (
                <div className="min-h-screen p-4 flex items-center justify-center bg-[#5C3A21]">
                    <div className="bg-white rounded-[3rem] w-full max-w-4xl flex flex-col md:flex-row shadow-2xl overflow-hidden">
                        <div className="bg-[#E6A122] p-10 text-white md:w-2/5 flex flex-col justify-center text-center font-black">
                            <i data-lucide="calculator" className="w-16 h-16 mx-auto mb-6 text-[#5C3A21]"></i>
                            <h2 className="text-4xl font-black uppercase mb-10 tracking-tighter leading-none font-black uppercase">Abrir<br/>Caja</h2>
                            <p className="text-[10px] font-black opacity-50 uppercase tracking-widest mb-2 font-black font-black font-black">Total en Efectivo</p>
                            <div className="text-6xl font-black">$
                                {Object.entries(apertura.cash).reduce((acc, [d, q]) => acc + (parseFloat(d) * q), 0)}
                            </div>
                        </div>
                        <div className="p-8 md:p-12 flex-1 max-h-[85vh] overflow-y-auto no-scrollbar space-y-12 font-black font-black font-black">
                            <div className="grid grid-cols-2 gap-4 font-black">
                                {[1000, 500, 200, 100, 50, 20, 10, 5, 2, 1, 0.5].map(d => (
                                    <div key={d} className="bg-stone-50 p-2 rounded-2xl flex items-center justify-between px-5 border border-stone-100 font-black">
                                        <span className="font-black text-stone-300 text-xs font-black font-black font-black">${d}</span>
                                        <input type="number" placeholder="0" className="w-16 bg-transparent text-center font-black text-xl text-[#5C3A21] outline-none font-black" onChange={e => setApertura({...apertura, cash: {...apertura.cash, [d]: parseInt(e.target.value) || 0}})} />
                                    </div>
                                ))}
                            </div>
                            <div className="border-t pt-8 font-black font-black">
                                <h3 className="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-6 font-black font-black font-black">Stock Bebidas</h3>
                                <div className="grid grid-cols-2 gap-4 font-black font-black">
                                    {BEBIDAS_CAT.map(r => (
                                        <div key={r.id} className="bg-pink-50 p-3 rounded-2xl flex items-center justify-between px-5 font-black font-black">
                                            <span className="text-[9px] font-black uppercase truncate opacity-60 pr-2 font-black font-black">{r.nombre}</span>
                                            <input type="number" placeholder="0" className="w-10 bg-white rounded-lg text-center font-black text-pink-600 outline-none p-1 font-black font-black" onChange={e => setApertura({...apertura, stock: {...apertura.stock, [r.id]: parseInt(e.target.value) || 0}})} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button onClick={handleApertura} disabled={isLoading} className="w-full bg-[#5C3A21] text-white font-black py-6 rounded-[2rem] shadow-xl btn-active uppercase text-sm tracking-widest font-black font-black font-black">CONFIRMAR</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <div id="ticket-real" className="hidden print:block font-mono text-[10px] leading-tight border p-4">
                        {printData && (
                            <div className="text-center font-black">
                                <h2 className="text-xl font-black mb-1 uppercase text-[#5C3A21] font-black font-black font-black font-black">Señora Taco</h2>
                                <p className="text-[8px] opacity-70 mb-4 font-black">{DIRECCION}</p>
                                <div className="border-b border-dashed my-4 opacity-40 font-black"></div>
                                {printData.items.map((i, idx) => (
                                    <div key={idx} className="mb-2 text-left font-black">
                                        <div className="flex justify-between font-black uppercase text-[11px] font-black font-black">
                                            <span>{i.tipo==='combo'?`Combo ${i.combo.nombre}`:i.nombrePersona}</span>
                                            <span>${i.tipo==='combo'?i.combo.precio:i.precioTotal}</span>
                                        </div>
                                        {i.tipo==='combo' && i.ords.map((o, k) => (
                                            <div key={k} className="ml-2 mt-1 font-black font-black">
                                                <p className="text-[9px] font-bold opacity-60 uppercase font-black">Plato {k+1}: {o.nombre || '...'}</p>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                                <div className="border-t border-dashed my-4 font-black"></div>
                                <div className="flex justify-between font-black text-[14px] font-black font-black"><span>TOTAL</span><span>${printData.total}.00</span></div>
                                <p className="mt-8 uppercase font-black opacity-30 text-[8px] text-center italic font-black font-black">¡Gracias por su compra!</p>
                            </div>
                        )}
                    </div>

                    <nav className="bg-[#E6A122] p-5 text-white flex justify-between items-center sticky top-0 z-50 shadow-xl no-print font-black">
                        <div className="flex items-center gap-5 font-black">
                            <div className="bg-white p-1 rounded-full w-14 h-14 overflow-hidden border-2 border-white shrink-0 active-bounce shadow-lg font-black">
                                <img src={URL_LOGO} className="w-full h-full object-cover" onError={(e)=>e.target.style.display='none'} />
                            </div>
                            <h1 className="font-black uppercase tracking-tighter hidden sm:block text-2xl font-black font-black font-black">Sra. Taco</h1>
                        </div>
                        <div className="flex items-center gap-3 font-black">
                            <button onClick={()=>setView('pos')} className={`p-4 rounded-[1.5rem] transition-all ${view==='pos'?'bg-[#5C3A21] scale-110 shadow-2xl':''}`}><i data-lucide="layout-dashboard"></i></button>
                            <button onClick={()=>setView('history')} className={`p-4 rounded-[1.5rem] transition-all ${view==='history'?'bg-[#5C3A21] scale-110 shadow-2xl':''}`}><i data-lucide="clock"></i></button>
                            <button onClick={()=>setModalCarrito(true)} className="ml-4 bg-[#E84E8A] px-8 py-4 rounded-full font-black shadow-lg btn-active flex items-center gap-3 relative font-black font-black font-black font-black">
                                <i data-lucide="shopping-bag" className="w-6 h-6 font-black font-black"></i>
                                {carrito.length>0 && <span className="absolute -top-1 -right-1 bg-white text-[#E84E8A] w-6 h-6 flex items-center justify-center rounded-full text-[10px] animate-bounce font-black shadow-sm font-black font-black">{carrito.length}</span>}
                            </button>
                        </div>
                    </nav>

                    <main className="p-6 sm:p-12 max-w-7xl mx-auto flex-1 no-print font-black">
                        {view === 'pos' ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10 font-black font-black">
                                {COMBOS_DATA.map(c => (
                                    <div key={c.id} className="bg-white rounded-[4rem] p-12 border border-stone-100 shadow-sm text-center flex flex-col group hover:shadow-2xl transition-all hover:-translate-y-2 font-black">
                                        <h3 className="text-3xl font-black uppercase text-stone-700 font-black font-black font-black">{c.nombre}</h3>
                                        <div className="my-10 text-7xl font-black text-[#E84E8A] tracking-tighter font-black font-black font-black font-black font-black">${c.precio}</div>
                                        <button onClick={() => {
                                            const ords = Array.from({length: c.ords}, () => ({nombre: "", tacos: Array.from({length: c.tacos}, () => ({guiso: "Deshebrada con Papa", tortilla: "Maíz", frij: true}))}));
                                            setWizardCombo({ combo: c, paso: 0, ords, beverages: Array.from({length: c.beb}, () => BEBIDAS_CAT[0].id) });
                                        }} className="w-full bg-[#5C3A21] group-hover:bg-black text-white font-black py-6 rounded-[2.5rem] shadow-xl btn-active uppercase text-[11px] tracking-widest transition-all font-black font-black font-black">TOMAR ORDEN</button>
                                    </div>
                                ))}
                                <div className="md:col-span-3 font-black font-black">
                                    <button onClick={() => setModalLibre({nombrePersona: "", tacos: [{guiso: "Barbacoa", tortilla: "Maíz", frij: true, id: Date.now()}], bebidasExtras: []})} className="w-full border-4 border-dashed border-stone-200 rounded-[4rem] p-16 text-stone-300 font-black uppercase text-2xl hover:bg-white hover:text-pink-500 hover:border-pink-500 transition-all btn-active font-black font-black font-black">
                                        <i data-lucide="plus" className="inline w-12 h-12 mr-4 -mt-2 shadow-sm font-black font-black"></i> Venta Directa
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-12 animate-in slide-in-from-bottom duration-500 font-black font-black">
                                <div className="bg-white rounded-[3rem] p-10 shadow-2xl flex flex-col lg:flex-row justify-between items-center gap-10 border border-stone-50 font-black font-black">
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-8 flex-1 w-full text-center font-black font-black">
                                        <div className="bg-stone-50 p-6 rounded-[2.5rem] shadow-inner font-black font-black"><p className="text-[10px] font-black opacity-30 uppercase font-black font-black">Inicio</p><p className="text-3xl font-black text-stone-700 font-black font-black font-black font-black font-black font-black">${sesion?.totalInicio}</p></div>
                                        <div className="bg-green-50 p-6 rounded-[2.5rem] shadow-inner font-black font-black"><p className="text-[10px] font-black text-green-300 uppercase font-black font-black">Cash</p><p className="text-3xl font-black text-green-700 font-black font-black font-black font-black font-black font-black">${tickets.filter(t=>t.metodo==='Efectivo').reduce((s,t)=>s+t.total,0)}</p></div>
                                        <div className="bg-blue-50 p-6 rounded-[2.5rem] shadow-inner font-black font-black"><p className="text-[10px] font-black text-blue-300 uppercase font-black font-black">Otros</p><p className="text-3xl font-black text-blue-700 font-black font-black font-black font-black font-black font-black">${tickets.filter(t=>t.metodo!=='Efectivo').reduce((s,t)=>s+t.total,0)}</p></div>
                                        <div className="bg-amber-50 p-6 rounded-[2.5rem] shadow-inner font-black font-black"><p className="text-[10px] font-black text-amber-400 uppercase font-black font-black">Propina</p><p className="text-3xl font-black text-amber-700 font-black font-black font-black font-black font-black font-black">${tickets.reduce((s,t)=>s+(t.propina||0),0)}</p></div>
                                    </div>
                                    <button onClick={()=>setModalSurtir(true)} className="bg-stone-800 hover:bg-black text-white px-10 py-5 rounded-[2.5rem] font-black uppercase text-[11px] tracking-widest active:scale-95 shadow-xl transition-all font-black font-black font-black font-black">📦 SURTIR</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 font-black">
                                    {tickets.map(t => (
                                        <div key={t.id} className="bg-white rounded-[3rem] p-8 border border-stone-100 shadow-sm flex flex-col justify-between hover:shadow-2xl transition-all relative group font-black">
                                            <div className="font-black font-black">
                                                <div className="flex justify-between items-center mb-6 font-black font-black">
                                                    <span className="text-[10px] font-black opacity-20 uppercase font-black font-black font-black font-black font-black">{new Date(t.fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                                    <span className={`text-[8px] font-black px-3 py-1 rounded-full uppercase bg-stone-50 font-black font-black font-black font-black font-black`}>{t.metodo}</span>
                                                </div>
                                                <p className="text-4xl font-black text-[#5C3A21] tracking-tighter font-black font-black font-black font-black font-black font-black font-black">${t.total}.00</p>
                                            </div>
                                            <div className="mt-8 space-y-4 font-black font-black font-black font-black font-black">
                                                <div className="bg-amber-50/50 p-4 rounded-3xl flex items-center border border-amber-100/50 shadow-inner font-black">
                                                    <input type="number" placeholder="Propina $" className="bg-transparent text-lg font-black text-amber-700 outline-none w-full placeholder:text-amber-200 text-center font-black font-black font-black" defaultValue={t.propina || ""} onBlur={e => db.collection(`artifacts/${appId}/users/${user.uid}/tickets`).doc(t.id).update({propina: parseFloat(e.target.value)||0})} />
                                                </div>
                                                <div className="flex gap-2 font-black font-black">
                                                    <button onClick={() => { setPrintData(t); setTimeout(()=>window.print(),300); }} className="flex-1 py-4 bg-stone-50 rounded-[1.5rem] text-[10px] font-black uppercase flex items-center justify-center gap-2 text-stone-400 hover:bg-stone-100 transition-all shadow-inner font-black font-black font-black"><i data-lucide="printer" className="w-5 h-5 shadow-sm font-black font-black font-black font-black"></i> Ticket</button>
                                                    <button onClick={() => db.collection(`artifacts/${appId}/users/${user.uid}/tickets`).doc(t.id).delete()} className="p-4 text-stone-100 hover:text-red-400 active-bounce font-black font-black font-black"><i data-lucide="trash-2" className="w-5 h-5 shadow-sm font-black font-black"></i></button>
                                                </div>
                                            </div>

                                <button onClick={()=>setModalSurtir(false)} className="w-full bg-[#5C3A21] hover:bg-black text-white py-8 rounded-[2.5rem] font-black uppercase text-xs active:scale-95 transition-all tracking-[0.4em] shadow-2xl shadow-black/10 uppercase font-black leading-none font-black font-black font-black font-black font-black font-black font-black font-black">Listo</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL ÉXITO */}
                    {modalExito && (
                        <div className="fixed inset-0 z-[90] bg-[#5C3A21] flex items-center justify-center p-12 text-center no-print backdrop-blur-md font-black font-black">
                            <div className="max-w-md w-full animate-in zoom-in-90 duration-700 font-black font-black">
                                <div className="w-48 h-48 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-16 shadow-[0_40px_100px_rgba(34,197,94,0.4)] border-[16px] border-green-400 animate-bounce-short shadow-green-500/20 font-black font-black"><i data-lucide="check" className="w-24 h-24 text-white font-black font-black font-black"></i></div>
                                <h2 className="text-7xl font-black text-white uppercase tracking-tighter mb-8 leading-none tracking-tighter font-black shadow-black/10 font-black font-black font-black font-black font-black">¡Vendido!</h2>
                                <p className="text-yellow-400 font-bold uppercase text-[12px] tracking-[0.5em] mb-24 opacity-80 tracking-widest uppercase font-black font-black font-black font-black font-black font-black">Registro guardado correctamente</p>
                                <div className="space-y-6 font-black font-black font-black">
                                    <button onClick={()=>{setTimeout(()=>window.print(), 300);}} className="w-full bg-white text-[#5C3A21] font-black py-9 rounded-[3.5rem] shadow-2xl flex items-center justify-center space-x-6 uppercase text-sm tracking-[0.2em] btn-active hover:bg-yellow-400 border-b-8 border-stone-200 shadow-white/10 active:scale-95 transition-all leading-none font-black uppercase font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><i data-lucide="printer" className="w-8 h-8 font-black font-black"></i><span>Imprimir Ticket</span></button>
                                    <button onClick={()=>setModalExito(false)} className="w-full bg-white/5 hover:bg-white/10 text-white font-black py-7 rounded-[3rem] uppercase text-[12px] tracking-[0.4em] active:scale-95 transition-all border-2 border-white/10 leading-none font-black uppercase opacity-60 font-black font-black font-black font-black font-black font-black font-black">Siguiente Venta</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
